# This is an example docker-compose file for local deployment of the chatbot worker.
# It assumes that the chatbot server is running on the host machine and is accessible via http://localhost:8080. The worker will connect to the server using the special hostname `host.docker.internal`, which is a Docker feature that allows containers to access the host machine's network.
# On first run, use this command for setting up the worker:
# docker compose -f docker-compose.example-local.yml run -it --rm chatbot-worker
# It will ask you to enter credentials for the chatbot server and will register the worker. After that, you can start the worker in detached mode:
# docker compose -f docker-compose.example-local.yml up -d

name: chatbot-worker

services:
  chatbot-worker:
    image: ghcr.io/torvian-eu/chatbot-worker:latest
    container_name: chatbot-worker
    environment:
      - CHATBOT_WORKER_SETUP_SERVER_URL=http://host.docker.internal:8080
      - PUID=1000  # Change to your actual host UID (run 'id -u')
      - PGID=1000  # Change to your actual host GID (run 'id -g')
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
      - npm-cache:/app/cache/npm
      - uv-cache:/app/cache/uv
    restart: unless-stopped

volumes:
  npm-cache:
  uv-cache: