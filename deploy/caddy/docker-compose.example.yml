name: caddy

services:
  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../wasm-client/dist:/srv/client:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - chatbot-network

volumes:
  caddy_data:
  caddy_config:

networks:
  chatbot-network:
    external: true