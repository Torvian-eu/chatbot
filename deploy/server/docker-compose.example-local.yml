name: chatbot-server

services:
  chatbot-server:
    image: ghcr.io/torvian-eu/chatbot-server:latest
    container_name: chatbot-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8080"
      SERVER_CONNECTOR_TYPE: "HTTP"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs